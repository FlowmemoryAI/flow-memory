# PRODUCTION: change every `plan: free` below to a paid Render plan before public deployment.
# Free plans require RENDER_ALLOW_FREE_PLANS=true and are accepted only for non-production smoke tests.
services:
  - type: web
    name: flow-memory-compute-market-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile.compute-market
    dockerContext: .
    dockerCommand: flow-memory-api --host 0.0.0.0 --port 8765 --require-scopes
    autoDeployTrigger: off
    healthCheckPath: /healthz
    envVars:
      - key: FLOW_MEMORY_API_HOST
        value: 0.0.0.0
      - key: FLOW_MEMORY_API_PORT
        value: 8765
      - key: FLOW_MEMORY_PUBLIC_API_URL
        sync: false
      - key: FLOW_MEMORY_API_KEY
        generateValue: true
      - key: FLOW_MEMORY_API_KEY_SCOPES
        value: api:read api:write api:admin api:audit compute:read compute:plan compute:execute compute:admin compute:audit compute:provider-admin compute:policy-admin compute:billing compute:settlement-admin inference:read inference:plan inference:proxy inference:buy inference:sell inference:admin inference:audit
      - key: FLOW_MEMORY_API_REQUIRE_SCOPES
        value: true
      - key: FLOW_MEMORY_API_JWT_HS256_SECRET
        sync: false
      - key: FLOW_MEMORY_API_JWT_ISSUER
        value: ""
      - key: FLOW_MEMORY_API_JWT_AUDIENCE
        value: ""
      - key: FLOW_MEMORY_API_JWT_LEEWAY_SECONDS
        value: 60
      - key: FLOW_MEMORY_API_RATE_LIMIT
        value: 120
      - key: FLOW_MEMORY_API_RATE_LIMIT_WINDOW_SECONDS
        value: 60
      - key: FLOW_MEMORY_API_MAX_BODY_BYTES
        value: 1048576
      - key: FLOW_MEMORY_API_ENABLE_NONCE_CHECK
        value: true
      - key: FLOW_MEMORY_API_MAX_REQUEST_AGE_SECONDS
        value: 300
      - key: FLOW_MEMORY_API_NONCE_REPLAY_BACKEND
        value: redis
      - key: FLOW_MEMORY_API_NONCE_REDIS_PREFIX
        value: flow-memory:api
      - key: FLOW_MEMORY_API_NONCE_FAIL_CLOSED
        value: true
      - key: FLOW_MEMORY_API_NONCE_REQUIRE_TLS
        value: true
      - key: FLOW_MEMORY_API_NONCE_VERIFY_TLS
        value: true
      - key: FLOW_MEMORY_LOG_LEVEL
        value: INFO
      - key: FLOW_MEMORY_COMPUTE_METRICS_ENABLED
        value: true
      - key: FLOW_MEMORY_COMPUTE_TRACING_ENABLED
        value: true
      - key: FLOW_MEMORY_COMPUTE_MARKET_ENABLED
        value: true
      - key: FLOW_MEMORY_COMPUTE_MARKET_MODE
        value: production_planning
      - key: FLOW_MEMORY_COMPUTE_STORAGE_BACKEND
        value: postgres
      - key: FLOW_MEMORY_COMPUTE_DATABASE_URL
        fromDatabase:
          name: flow-memory-compute-market-postgres
          property: connectionString
      - key: FLOW_MEMORY_COMPUTE_POSTGRES_SSL_MODE
        value: require
      - key: FLOW_MEMORY_COMPUTE_STORAGE_POOL_SIZE
        value: 4
      - key: FLOW_MEMORY_COMPUTE_STORAGE_MAX_OVERFLOW
        value: 4
      - key: FLOW_MEMORY_COMPUTE_STORAGE_TIMEOUT_MS
        value: 5000
      - key: FLOW_MEMORY_COMPUTE_STORAGE_STATEMENT_TIMEOUT_MS
        value: 5000
      - key: FLOW_MEMORY_COMPUTE_MIGRATIONS_ENABLED
        value: true
      - key: FLOW_MEMORY_COMPUTE_MIGRATIONS_AUTO_RUN
        value: true
      - key: FLOW_MEMORY_COMPUTE_REQUIRE_MANAGED_SQL_IN_PRODUCTION
        value: true
      - key: FLOW_MEMORY_COMPUTE_REQUIRE_MANAGED_REDIS_IN_PRODUCTION
        value: true
      - key: FLOW_MEMORY_COMPUTE_RATE_LIMIT_ENABLED
        value: true
      - key: FLOW_MEMORY_COMPUTE_RATE_LIMITS_ENABLED
        value: true
      - key: FLOW_MEMORY_COMPUTE_RATE_LIMIT_BACKEND
        value: redis
      - key: FLOW_MEMORY_COMPUTE_CIRCUIT_BREAKER_ENABLED
        value: true
      - key: FLOW_MEMORY_COMPUTE_CIRCUIT_BREAKER_BACKEND
        value: redis
      - key: FLOW_MEMORY_COMPUTE_REDIS_URL
        sync: false
      - key: FLOW_MEMORY_COMPUTE_REDIS_PREFIX
        value: flow-memory:compute-market
      - key: FLOW_MEMORY_COMPUTE_RATE_LIMIT_FAIL_CLOSED
        value: true
      - key: FLOW_MEMORY_COMPUTE_CIRCUIT_BREAKER_FAIL_CLOSED
        value: true
      - key: FLOW_MEMORY_COMPUTE_DRY_RUN_REQUIRED
        value: true
      - key: FLOW_MEMORY_COMPUTE_LIVE_SETTLEMENT_ENABLED
        value: false
      - key: FLOW_MEMORY_COMPUTE_BROADCAST_ENABLED
        value: false
      - key: FLOW_MEMORY_COMPUTE_PRIVATE_KEY_INPUTS_ALLOWED
        value: false
      - key: FLOW_MEMORY_COMPUTE_AUDIT_REQUIRED
        value: true
      - key: FLOW_MEMORY_COMPUTE_AUDIT_EXPORT_REQUIRED
        value: true
      - key: FLOW_MEMORY_COMPUTE_AUDIT_EXPORT_URI
        sync: false
      - key: FLOW_MEMORY_COMPUTE_AUDIT_EXPORT_OBJECT_LOCK_MODE
        value: COMPLIANCE
      - key: FLOW_MEMORY_COMPUTE_AUDIT_EXPORT_RETENTION_DAYS
        value: 365
      - key: FLOW_MEMORY_COMPUTE_AUDIT_CHECKPOINT_INTERVAL_SECONDS
        value: 86400
      - key: FLOW_MEMORY_COMPUTE_AUDIT_EXPORT_IMMUTABLE_REQUIRED
        value: true
      - key: FLOW_MEMORY_COMPUTE_AUDIT_EXPORT_S3_REGION
        sync: false
      - key: FLOW_MEMORY_COMPUTE_AUDIT_EXPORT_S3_ENDPOINT_URL
        value: ""
      - key: FLOW_MEMORY_BILLING_STRIPE_CHECKOUT_ENABLED
        value: false
      - key: FLOW_MEMORY_BILLING_STRIPE_SECRET_KEY
        sync: false
      - key: FLOW_MEMORY_BILLING_STRIPE_SUCCESS_URL
        value: ""
      - key: FLOW_MEMORY_BILLING_STRIPE_CANCEL_URL
        value: ""
      - key: FLOW_MEMORY_BILLING_STRIPE_CHECKOUT_TIMEOUT_MS
        value: 5000
      - key: FLOW_MEMORY_BILLING_STRIPE_API_BASE_URL
        value: https://api.stripe.com
      - key: FLOW_MEMORY_BILLING_STRIPE_PRODUCT_NAME
        value: Flow Memory compute credits
      - key: FLOW_MEMORY_BILLING_STRIPE_WEBHOOK_SECRET
        sync: false
      - key: FLOW_MEMORY_BILLING_STRIPE_WEBHOOK_TOLERANCE_SECONDS
        value: 300
      - key: FLOW_MEMORY_COMPUTE_ALERT_ROUTING_ENABLED
        value: false
      - key: FLOW_MEMORY_COMPUTE_ALERT_WEBHOOK_URL
        value: ""
      - key: FLOW_MEMORY_COMPUTE_ALERT_WEBHOOK_SECRET
        sync: false
      - key: FLOW_MEMORY_COMPUTE_ALERT_WEBHOOK_TIMEOUT_MS
        value: 2000
      - key: FLOW_MEMORY_COMPUTE_ERROR_TRACKING_ENABLED
        value: false
      - key: FLOW_MEMORY_COMPUTE_ERROR_TRACKING_WEBHOOK_URL
        value: ""
      - key: FLOW_MEMORY_COMPUTE_ERROR_TRACKING_WEBHOOK_SECRET
        sync: false
      - key: FLOW_MEMORY_COMPUTE_ERROR_TRACKING_TIMEOUT_MS
        value: 2000
      - key: FLOW_MEMORY_COMPUTE_TELEMETRY_EXPORT_ENABLED
        value: false
      - key: FLOW_MEMORY_COMPUTE_OTLP_ENDPOINT_URL
        value: ""
      - key: FLOW_MEMORY_COMPUTE_OTLP_HEADERS
        sync: false
      - key: FLOW_MEMORY_COMPUTE_OTLP_TIMEOUT_MS
        value: 5000
      - key: FLOW_MEMORY_COMPUTE_EXTERNAL_QUOTES_ENABLED
        value: false
      - key: FLOW_MEMORY_COMPUTE_EXTERNAL_PROVIDER_ALLOWLIST
        value: ""
      - key: FLOW_MEMORY_COMPUTE_PROVIDER_CALLBACK_IP_ALLOWLIST
        value: ""
      - key: FLOW_MEMORY_COMPUTE_PROVIDER_CONTRACTS_REQUIRED
        value: false
      - key: FLOW_MEMORY_COMPUTE_PROVIDER_CONTRACTS_VERIFIED
        value: false
      - key: FLOW_MEMORY_COMPUTE_ECONOMIC_MEMORY_WRITES_ENABLED
        value: true
      - key: FLOW_MEMORY_COMPUTE_ADMIN_MUTATIONS_ENABLED
        value: true
      - key: FLOW_MEMORY_COMPUTE_PROVIDER_TIMEOUT_MS
        value: 2000
      - key: FLOW_MEMORY_COMPUTE_GLOBAL_PLANNING_TIMEOUT_MS
        value: 10000
      - key: FLOW_MEMORY_COMPUTE_MAX_CANDIDATE_ROUTES
        value: 64
      - key: FLOW_MEMORY_COMPUTE_MAX_QUOTE_CACHE_ENTRIES
        value: 10000
      - key: FLOW_MEMORY_COMPUTE_SETTLEMENT_ENVIRONMENT
        value: ""
      - key: FLOW_MEMORY_COMPUTE_SETTLEMENT_SECURITY_REVIEW_ID
        value: ""

  - type: keyvalue
    name: flow-memory-compute-market-redis
    plan: free
    region: oregon
    # Direct blueprint deploys cannot infer public egress CIDRs for the external TLS Redis endpoint.
    # Prefer scripts/deploy_compute_market_render_level1.py with RENDER_KEYVALUE_IP_ALLOWLIST set,
    # or replace this empty list with explicit CIDRs before using the blueprint directly.
    ipAllowList: []
    maxmemoryPolicy: noeviction

databases:
  - name: flow-memory-compute-market-postgres
    databaseName: flow_memory
    user: flow_memory
    plan: free
    region: oregon
    ipAllowList: []
